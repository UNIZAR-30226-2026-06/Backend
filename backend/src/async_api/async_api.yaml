        $ref: '#/components/messages/disconnect'
  


  
  

        

operations: 
  nuevoMensajeChat:
    action: send
    channel:
      $ref: '#/channels/nuevoMensajeChat'
      

  newMessage:
    action: receive
    channel:
      $ref: '#/channels/newMessage'

  pendingFriendRequests:
    action: receive
    channel:
      $ref: '#/channels/pendingFriendRequests'

  res_pendingFriendRequests:
    action: send
    channel:
      $ref: '#/channels/res_pendingFriendRequests'

  newFriendRequest:
    action: receive
    channel:
      $ref: '#/channels/newFriendRequest'

  mostrarFriendRequest:
    action: send
    channel:
      $ref: '#/channels/mostrarFriendRequest'


  newFriendRequestAccepted:
    action: receive
    channel:
      $ref: '#/channels/newFriendRequestAccepted'

  mostrarAceptadaFriendRequest:
    action: send
    channel:
      $ref: '#/channels/mostrarAceptadaFriendRequest'

  newFriendRequestReject:
    action: receive
    channel:
      $ref: '#/channels/newFriendRequestReject'

  mostrarRechazadaFriendRequest:
    action: send
    channel:
      $ref: '#/channels/mostrarRechazadaFriendRequest'

  avisarAmigosConectados_UserOnline:
    action: receive
    channel:
      $ref: '#/channels/avisarAmigosConectados_UserOnline'

  amigoConectado:
    action: send
    channel:
      $ref: '#/channels/amigoConectado'
  
  avisarAmigosConectados_UserDisconnect:
    action: receive
    channel:
      $ref: '#/channels/avisarAmigosConectados_UserDisconnect'

  amigoDesconectado:
    action: send
    channel:
      $ref: '#/channels/amigoDesconectado'
  
  start_game:
    action: receive
    channel:
      $ref: '#/channels/start_game'
  
  partida_iniciada:
    action: send
    channel:
      $ref: '#/channels/partida_iniciada'
  
  comprobar_turno:
    action: receive
    channel:
      $ref: '#/channels/comprobar_turno'

  turno_invalido:
    action: send
    channel:
      $ref: '#/channels/turno_invalido'
  
  turno_siguiente:
    action: send
    channel:
      $ref: '#/channels/turno_siguiente' 
    
  robar_carta:
    action: receive
    channel:
      $ref: '#/channels/robar_carta'

  carta_robada:
    action: send
    channel:
      $ref: '#/channels/carta_robada'

  disconnect:
    action: receive
    channel:
      $ref: '#/channels/disconnect'


components:
  messages:
    nuevoMensajeChat:
      name: nuevoMensajeChat
      title: Nuevo mensaje chat
      summary: Emite el mensaje filtrado a todos los usuarios de la sala donde se encuentra el emisor del mensaje
      payload:
        type: object
        properties:
          mensaje:
            type: string

    newMessage:
      name: newMessage
      title: New Message
      summary: Recibir mensaje de un usuario, lo envia para verificar y reenviar a toda la sala 
      payload:
        type: object
        properties:
          mensaje:
            type: string
          partidaID:
            type: string

    pendingFriendRequests:
      name: pendingFriendRequests
      title: Pending Friend Requests
      summary: Recibir peticion de solicitudes de amistad pendientes
      

    res_pendingFriendRequests:
      name: res_pendingFriendRequests
      title: Res Pending Friend Requests
      summary: Lista de solicitudes de amistad pendientes de contestar
      payload:
        type: array
        items:
          type: object
          properties:
            id_usuario_origen:
              type: string
            id_usuario_destino:
              type: string
            estado:
              type: string

    newFriendRequest:
      name: newFriendRequest
      title: New Friend Request
      summary:  Recibir notificacion de que se ha enviado una solicitud de amistad
      payload:
        type: string

    mostrarFriendRequest:
      name: mostrarFriendRequest
      title: Mostrar Friend Request
      summary: Notificacion de solicitud de amistad enviada
      payload:
        type: string

    newFriendRequestAccepted:
      name: newFriendRequestAccepted
      title: New Friend Request Accepted
      summary: Recibir notificacion de que se ha aceptado una solicitud de amistad
      payload:
        type: string

    mostrarAceptadaFriendRequest:
      name: mostrarAceptadaFriendRequest
      title: Mostrar Aceptada Friend Request
      summary: Notificacion al cliente de solicitud aceptada
      payload:
        type: string

    newFriendRequestReject:
      name: newFriendRequestReject
      title: New Friend Request Reject
      summary: Recibe notificacion de rechazo de solicitud de amistad
      payload:
        type: string

    mostrarRechazadaFriendRequest:
      name: mostrarRechazadaFriendRequest
      title: Mostrar Rechazada Friend Request
      summary: Notificacion al cliente de solicitud rechazada
      payload:
        type: string

    avisarAmigosConectados_UserOnline:
      name: avisarAmigosConectados_UserOnline
      title: Avisar Amigos Conectados User Online
      summary: Notificacion de que un amigo se ha conectado
      

    amigoConectado:
      name: amigoConectado
      title: Amigo Conectado
      summary: Notifica al cliente que un amigo se ha conectado
      payload:
        type: string

    avisarAmigosConectados_UserDisconnect:
      name: avisarAmigosConectados_UserDisconnect
      title: Avisar Amigos Conectados User Disconnect
      summary: Notificacion de que un amigo se ha desconectado
      

    amigoDesconectado:
      name: amigoDesconectado
      title: Amigo Desconectado
      summary: Notifica al cliente que un amigo se ha desconectado
      payload:
        type: string

    start_game:
      name: start_game
      title: Start Game
      summary: Crear e iniciar partida en el servidor, 
      payload:
        type: object
        properties:
          jugadores:
            type: integer
          configuracion:
            type: object
            properties:
              maxJugadores:
                type: integer
              numCartasInicio:
                type: integer
              timeoutTurno:
                type: integer
              privada:
                type: boolean
              modoCartasEspeciales:
                type: boolean
              modoRoles:
                type: boolean


    partida_iniciada:
      name: partida_iniciada
      title: Partida Iniciada
      summary: se le indica a todos los jugadores de la partida que la partida ha comenzado y se les envia el mazo inicial
      payload:
        type: object
        properties:
          partidaID:
            type: string
          mazoInicial:
            type: array
            items:
              type: object
              properties:
                id_carta: 
                  type: integer
                tipo_carta:
                  type: string
                color:
                  type: string
                numero:
                  type: integer
                codigo:
                  type: string
                id_estilo:
                  type: integer

    comprobar_turno:
      name: comprobar_turno
      title: Comprobar Turno
      summary: El jugador que ha jugado el turno emite este evento para comprobar si el turno es valido
      payload:
        type: object
        properties:
          partidaID:
            type: string
          cartaId:
            type: integer
            
    turno_invalido:
      name: turno_invalido
      title: Turno Invalido
      summary: Se le indica al jugador que ha jugado el turno que el turno no es valido, con un mensaje de error
      payload:
        type: object
        properties:
          message:
            type: string
    
    turno_siguiente:
      name: turno_siguiente
      title: Turno Siguiente
      summary: Se le indica a todos los jugadores de la partida quien es el siguiente jugador y si tiene que robar cartas o no
      payload:
        type: object
        properties:
          siguienteJugador:
            type: string
          cartasRobar:
            type: integer

    robar_carta:
      name: robar_carta
      title: Robar Carta
      summary: El jugador que tiene que robar una carta emite este evento para robar la carta
      payload:
        type: object
        properties:
          partidaID:
            type: string
          

    carta_robada:
      name: carta_robada
      title: Carta Robada
      summary: Se le envia al jugador que ha robado la carta la carta robada
      payload:
        type: object
        properties:
          carta:
            type: object
            properties:
              id_carta: 
                type: integer
              tipo_carta:
                type: string
              color:
                type: string
              numero:
                type: integer
              codigo:
                type: string
              id_estilo:
                type: integer

    disconnect:
      name: disconnect
      title: Disconnect
      summary: Un cliente notifica que se ha desconectado al servidor, para eliminarlo de la lista de usuarios conectados

