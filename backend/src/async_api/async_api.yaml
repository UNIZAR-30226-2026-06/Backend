asyncapi: 3.1.0
id: 'urn:com:notuno:websocket'
info:
  title: Notuno Web Events Socket
  version: 1.0.0
defaultContentType: application/json
servers:
  dev:
    host: ws://localhost:3000

    protocol: ws
channels:
  nuevoMensajeChat:
    address: chat.nuevoMensajeChat
    parameters: {}
    messages:
      nuevoMensajeChat:
        $ref: '#/components/messages/nuevoMensajeChat'

  newMessage:
    address: chat.newMessage
    parameters: {}
    messages:
      newMessage:
        $ref: '#/components/messages/newMessage'

  pendingFriendRequests:
    address: friends.pendingFriendRequests
    parameters: {}
    messages:
      pendingFriendRequests:
        $ref: '#/components/messages/pendingFriendRequests'

  res_pendingFriendRequests:
    address: friends.res_pendingFriendRequests
    parameters: {}
    messages:
      res_pendingFriendRequests:
        $ref: '#/components/messages/res_pendingFriendRequests'

  newFriendRequest:
    address: friends.newFriendRequest
    parameters: {}
    messages:
      newFriendRequest:
        $ref: '#/components/messages/newFriendRequest'

  mostrarFriendRequest:
    address: friends.mostrarFriendRequest
    parameters: {}
    messages:
      mostrarFriendRequest:
        $ref: '#/components/messages/mostrarFriendRequest'

  newFriendRequestAccepted:
    address: friends.newFriendRequestAccepted
    parameters: {}
    messages:
      newFriendRequestAccepted:
        $ref: '#/components/messages/newFriendRequestAccepted'

  mostrarAceptadaFriendRequest:
    address: friends.mostrarAceptadaFriendRequest
    parameters: {}
    messages:
      mostrarAceptadaFriendRequest:
        $ref: '#/components/messages/mostrarAceptadaFriendRequest'

  newFriendRequestReject:
    address: friends.newFriendRequestReject
    parameters: {}
    messages:
      newFriendRequestReject:
        $ref: '#/components/messages/newFriendRequestReject'

  mostrarRechazadaFriendRequest:
    address: friends.mostrarRechazadaFriendRequest
    parameters: {}
    messages:
      mostrarRechazadaFriendRequest:
        $ref: '#/components/messages/mostrarRechazadaFriendRequest'

  avisarAmigosConectados_UserOnline:
    address: friends.avisarAmigosConectados_UserOnline
    parameters: {}
    messages:
      avisarAmigosConectados_UserOnline:
        $ref: '#/components/messages/avisarAmigosConectados_UserOnline'

  amigoConectado:
    address: friends.amigoConectado
    parameters: {}
    messages:
      amigoConectado:
        $ref: '#/components/messages/amigoConectado'

  avisarAmigosConectados_UserDisconnect:
    address: notuno.friends.avisarAmigosConectados_UserDisconnect
    parameters: {}
    messages:
      avisarAmigosConectados_UserDisconnect:
        $ref: '#/components/messages/avisarAmigosConectados_UserDisconnect'

  amigoDesconectado:
    address: friends.amigoDesconectado
    parameters: {}
    messages:
      amigoDesconectado:
        $ref: '#/components/messages/amigoDesconectado'

operations: 
  nuevoMensajeChat:
    action: send
    channel:
      $ref: '#/channels/nuevoMensajeChat'
      

  newMessage:
    action: receive
    channel:
      $ref: '#/channels/newMessage'

  pendingFriendRequests:
    action: receive
    channel:
      $ref: '#/channels/pendingFriendRequests'

  res_pendingFriendRequests:
    action: send
    channel:
      $ref: '#/channels/res_pendingFriendRequests'

  newFriendRequest:
    action: receive
    channel:
      $ref: '#/channels/newFriendRequest'

  mostrarFriendRequest:
    action: send
    channel:
      $ref: '#/channels/mostrarFriendRequest'


  newFriendRequestAccepted:
    action: receive
    channel:
      $ref: '#/channels/newFriendRequestAccepted'

  mostrarAceptadaFriendRequest:
    action: send
    channel:
      $ref: '#/channels/mostrarAceptadaFriendRequest'

  newFriendRequestReject:
    action: receive
    channel:
      $ref: '#/channels/newFriendRequestReject'

  mostrarRechazadaFriendRequest:
    action: send
    channel:
      $ref: '#/channels/mostrarRechazadaFriendRequest'

  avisarAmigosConectados_UserOnline:
    action: receive
    channel:
      $ref: '#/channels/avisarAmigosConectados_UserOnline'

  amigoConectado:
    action: send
    channel:
      $ref: '#/channels/amigoConectado'
  
  avisarAmigosConectados_UserDisconnect:
    action: receive
    channel:
      $ref: '#/channels/avisarAmigosConectados_UserDisconnect'

  amigoDesconectado:
    action: send
    channel:
      $ref: '#/channels/amigoDesconectado'


components:
  messages:
    nuevoMensajeChat:
      name: nuevoMensajeChat
      title: Nuevo mensaje chat
      summary: Emite el mensaje filtrado a todos los usuarios de la sala donde se encuentra el emisor del mensaje
      payload:
        type: object
        properties:
          mensaje:
            type: string

    newMessage:
      name: newMessage
      title: New Message
      summary: Recibir mensaje de un usuario, lo envia para verificar y reenviar a toda la sala 
      payload:
        type: object
        properties:
          mensaje:
            type: string
          partidaID:
            type: string

    pendingFriendRequests:
      name: pendingFriendRequests
      title: Pending Friend Requests
      summary: Recibir peticion de solicitudes de amistad pendientes
      

    res_pendingFriendRequests:
      name: res_pendingFriendRequests
      title: Res Pending Friend Requests
      summary: Lista de solicitudes de amistad pendientes de contestar
      payload:
        type: array
        items:
          type: object
          properties:
            id_usuario_origen:
              type: string
            id_usuario_destino:
              type: string
            estado:
              type: string

    newFriendRequest:
      name: newFriendRequest
      title: New Friend Request
      summary:  Recibir notificacion de que se ha enviado una solicitud de amistad
      payload:
        type: string

    mostrarFriendRequest:
      name: mostrarFriendRequest
      title: Mostrar Friend Request
      summary: Notificacion de solicitud de amistad enviada
      payload:
        type: string

    newFriendRequestAccepted:
      name: newFriendRequestAccepted
      title: New Friend Request Accepted
      summary: Recibir notificacion de que se ha aceptado una solicitud de amistad
      payload:
        type: string

    mostrarAceptadaFriendRequest:
      name: mostrarAceptadaFriendRequest
      title: Mostrar Aceptada Friend Request
      summary: Notificacion al cliente de solicitud aceptada
      payload:
        type: string

    newFriendRequestReject:
      name: newFriendRequestReject
      title: New Friend Request Reject
      summary: Recibe notificacion de rechazo de solicitud de amistad
      payload:
        type: string

    mostrarRechazadaFriendRequest:
      name: mostrarRechazadaFriendRequest
      title: Mostrar Rechazada Friend Request
      summary: Notificacion al cliente de solicitud rechazada
      payload:
        type: string

    avisarAmigosConectados_UserOnline:
      name: avisarAmigosConectados_UserOnline
      title: Avisar Amigos Conectados User Online
      summary: Notificacion de que un amigo se ha conectado
      

    amigoConectado:
      name: amigoConectado
      title: Amigo Conectado
      summary: Notifica al cliente que un amigo se ha conectado
      payload:
        type: string

    avisarAmigosConectados_UserDisconnect:
      name: avisarAmigosConectados_UserDisconnect
      title: Avisar Amigos Conectados User Disconnect
      summary: Notificacion de que un amigo se ha desconectado
      

    amigoDesconectado:
      name: amigoDesconectado
      title: Amigo Desconectado
      summary: Notifica al cliente que un amigo se ha desconectado
      payload:
        type: string