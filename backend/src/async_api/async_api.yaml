asyncapi: 3.1.0
id: 'urn:com:notuno:websocket'
info:
  title: Notuno Web Events Socket
  version: 1.0.0
defaultContentType: application/json
servers:
  dev:
    host: ws://localhost:3000

    protocol: ws
channels:
  nuevoMensajeChat:
    address: chat.nuevoMensajeChat
    parameters: {}
    messages:
      nuevoMensajeChat:
        $ref: '#/components/messages/nuevoMensajeChat'

  newMessage:
    address: chat.newMessage
    parameters: {}
    messages:
      newMessage:
        $ref: '#/components/messages/newMessage'

  pendingFriendRequests:
    address: friends.pendingFriendRequests
    parameters: {}
    messages:
      pendingFriendRequests:
        $ref: '#/components/messages/pendingFriendRequests'

  res_pendingFriendRequests:
    address: friends.res_pendingFriendRequests
    parameters: {}
    messages:
      res_pendingFriendRequests:
        $ref: '#/components/messages/res_pendingFriendRequests'

  newFriendRequest:
    address: friends.newFriendRequest
    parameters: {}
    messages:
      newFriendRequest:
        $ref: '#/components/messages/newFriendRequest'

  mostrarFriendRequest:
    address: friends.mostrarFriendRequest
    parameters: {}
    messages:
      mostrarFriendRequest:
        $ref: '#/components/messages/mostrarFriendRequest'

  newFriendRequestAccepted:
    address: friends.newFriendRequestAccepted
    parameters: {}
    messages:
      newFriendRequestAccepted:
        $ref: '#/components/messages/newFriendRequestAccepted'

  mostrarAceptadaFriendRequest:
    address: friends.mostrarAceptadaFriendRequest
    parameters: {}
    messages:
      mostrarAceptadaFriendRequest:
        $ref: '#/components/messages/mostrarAceptadaFriendRequest'

  newFriendRequestReject:
