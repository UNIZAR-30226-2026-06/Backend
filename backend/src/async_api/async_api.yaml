        $ref: '#/components/messages/amigoDesconectado'


  start_game:
    address: game.start_game
    parameters: {}
    messages:
      start_game:
        $ref: '#/components/messages/start_game'

  partida_iniciada:
    address: game.partida_iniciada
    parameters: {}
    messages:
      partida_iniciada:
        $ref: '#/components/messages/partida_iniciada'
  
  comprobar_turno:
    address: game.comprobar_turno
    parameters: {}
