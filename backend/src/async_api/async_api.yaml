  mostrarRechazadaFriendRequest:
    address: friends.mostrarRechazadaFriendRequest
    parameters: {}
    messages:
      mostrarRechazadaFriendRequest:
        $ref: '#/components/messages/mostrarRechazadaFriendRequest'

  avisarAmigosConectados_UserOnline:
    address: friends.avisarAmigosConectados_UserOnline
    parameters: {}
    messages:
      avisarAmigosConectados_UserOnline:
        $ref: '#/components/messages/avisarAmigosConectados_UserOnline'

  amigoConectado:
    address: friends.amigoConectado
    parameters: {}
    messages:
      amigoConectado:
        $ref: '#/components/messages/amigoConectado'

  avisarAmigosConectados_UserDisconnect:
